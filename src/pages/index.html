<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>5214 · Power dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="top">
        <h1>5214</h1>
        <div class="header-actions">
          <div class="crumbs">
            power dashboard ·
            <a href="/api/config/rooms" target="_blank" rel="noopener">rooms.json</a>
          </div>
          <button type="button" id="settingsToggle" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
        </div>
      </header>

      <dialog id="settingsDialog" class="settings-dialog">
        <div class="modal-head">
          <h2>Settings</h2>
          <button type="button" id="settingsClose" class="icon-btn" aria-label="Close settings">×</button>
        </div>
        <div class="rate-control">
          <label for="electricityRate">Electricity rate</label>
          <div class="rate-input-wrap">
            <span>$</span>
            <input id="electricityRate" type="number" min="0" step="0.0001" inputmode="decimal" />
            <span>/ kWh</span>
          </div>
          <div class="rate-note" id="rateNote"></div>
        </div>
      </dialog>

      <div class="section-head">
        <h2 id="summaryTitle">Last 7 days</h2>
        <div class="range-toggle" id="summaryRanges">
          <button data-summary-range="month">This month</button>
          <button data-summary-range="24h">Last 24h</button>
          <button data-summary-range="7d" class="active">7d</button>
          <button data-summary-range="30d">30d</button>
          <button data-summary-range="all">All time</button>
        </div>
      </div>

      <div class="grid stats" id="totals"></div>

      <div class="chart-card">
        <div class="head">
          <h2 id="chartTitle">House total · last 7 days</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="totalChart"></canvas>
        </div>
      </div>

      <h2 style="font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 32px 0 12px;">
        Rooms
      </h2>
      <div class="grid cards" id="rooms"></div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
